name: Update VPN Lists

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add repo root to PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon aiohttp

      - name: Export Telegram credentials
        run: |
          echo "TG_API_ID=${{ secrets.TG_API_ID }}" >> $GITHUB_ENV
          echo "TG_API_HASH=${{ secrets.TG_API_HASH }}" >> $GITHUB_ENV
          printf "TG_SESSION=%s" "${{ secrets.TG_SESSION }}" >> $GITHUB_ENV

      - name: Run TGK scraper
        run: python scripts/tgk_scraper.py

      - name: Run parser
        run: python scripts/parser.py

      - name: Run checker
        run: python scripts/checker.py

      - name: Update README
        run: python scripts/update_readme.py

      - name: Commit and push changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Auto-update $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push
